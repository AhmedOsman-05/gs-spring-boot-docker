trigger:
- main

variables:
  dockerRegistryServiceConnection: '823b0184-b606-427f-993a-f325de6efe0c'
  imageRepository: 'ahmedosmangsspringbootdocker'
  containerRegistry: 'aosman.azurecr.io'
  # Променено: Dockerfile е в главната папка според снимката ти
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    
    - task: Gradle@3
      displayName: 'Gradle Build'
      inputs:
        gradleWrapperFile: 'gradlew'
        tasks: 'build'
        publishJUnitResults: true
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17' # Или '1.11' според твоя проект

    - task: Docker@2
      displayName: 'Build and push'
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)